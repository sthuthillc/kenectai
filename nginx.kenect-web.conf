server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── API proxy ───────────────────────────────────────────────────────────
  # The web app calls the API on same-origin paths (no CORS anywhere);
  # nginx forwards them to the kenect-api Cloud Run service. Host header
  # must be the upstream's, since Cloud Run routes on it.
  location ~ ^/(v1|v3|oauth|mcp)(/|$) {
    proxy_pass https://api.kenectai.com;
    proxy_ssl_server_name on;
    proxy_set_header Host api.kenectai.com;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
  }

  # ── Web app (built React bundle under /app/) ───────────────────────────
  location /app/ {
    try_files $uri /app/index.html;
  }
  location = /pricing { try_files /app/index.html =404; }
  location = /dashboard { try_files /app/index.html =404; }
  location /sessions/ { try_files /app/index.html =404; }
  location = /auth/callback { try_files /app/index.html =404; }
  location = /billing/success { try_files /app/index.html =404; }
  location = /billing/cancelled { try_files /app/index.html =404; }

  # ── Hand-authored landing page at the apex ─────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
